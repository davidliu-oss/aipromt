<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 繪圖 Prompt 生成器 (專屬版)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 14px;
        }
        select,
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        .output-area {
            margin-top: 30px;
            border-top: 2px dashed #eee;
            padding-top: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #3498db;
            border-radius: 5px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            margin-top: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-generate {
            background-color: #3498db;
            color: white;
            flex: 2;
        }
        .btn-generate:hover {
            background-color: #2980b9;
        }
        .btn-copy {
            background-color: #2ecc71;
            color: white;
            flex: 1;
        }
        .btn-copy:hover {
            background-color: #27ae60;
        }
        .btn-clear {
            background-color: #e74c3c;
            color: white;
            flex: 1;
        }
        .btn-clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <h1>✨ 專屬 AI 繪圖 Prompt 生成器</h1>

    <div class="container">
        <div class="grid">
            <div class="form-group">
                <label for="style">🎨 視覺風格</label>
                <select id="style">
                    <option value="">(不指定)</option>
                    <option value="photorealistic, 8k resolution, highly detailed">寫實攝影</option>
                    <option value="anime style, masterpiece">日本動漫風</option>
                    <option value="american comic style">美式漫畫</option>
                    <option value="watercolor painting">水彩畫</option>
                    <option value="oil painting">油畫</option>
                    <option value="3D render, octane render">3D 渲染</option>
                    <option value="pixel art">像素藝術</option>
                    <option value="flat illustration, vector art">Flat (扁平插畫)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gender">🚻 性別</label>
                <select id="gender">
                    <option value="">(不指定)</option>
                    <option value="man">男</option>
                    <option value="woman">女</option>
                </select>
            </div>

            <div class="form-group">
                <label for="age">🎂 年齡</label>
                <select id="age">
                    <option value="">(不指定)</option>
                    <option value="child">兒童</option>
                    <option value="young adult">青年</option>
                    <option value="middle-aged adult">中年</option>
                    <option value="older adult">中老年</option>
                    <option value="elderly">老年</option>
                </select>
            </div>

            <div class="form-group">
                <label for="race">🌍 人種</label>
                <select id="race">
                    <option value="Taiwanese" selected>台灣人</option>
                    <option value="Western">歐美人</option>
                </select>
            </div>

            <div class="form-group">
                <label for="body">🧍 身形</label>
                <select id="body">
                    <option value="average build" selected>勻稱</option>
                    <option value="slim body">苗條</option>
                    <option value="slightly chubby build">微胖</option>
                    <option value="overweight body">肥胖</option>
                </select>
            </div>

            <div class="form-group">
                <label for="clothing">👔 服裝</label>
                <select id="clothing">
                    <option value="">(不指定)</option>
                    <option value="wearing a suit">西裝</option>
                    <option value="wearing a doctor's lab coat">醫師袍</option>
                </select>
            </div>

            <div class="form-group">
                <label for="expression">🙂 表情與情緒</label>
                <select id="expression">
                    <option value="">(不指定)</option>
                    <option value="smiling">微笑</option>
                    <option value="crying loudly">大哭</option>
                    <option value="cold and serious expression">冷酷</option>
                    <option value="surprised expression">驚訝</option>
                    <option value="sorrowful expression">哀愁</option>
                </select>
            </div>

            <div class="form-group">
                <label for="atmosphere">🎭 情境 (氛圍)</label>
                <select id="atmosphere">
                    <option value="">(不指定)</option>
                    <option value="happy atmosphere">開心</option>
                    <option value="angry mood">生氣</option>
                    <option value="furious atmosphere">憤怒</option>
                    <option value="despairing atmosphere">絕望</option>
                    <option value="sad atmosphere">悲傷</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lighting">💡 光線</label>
                <select id="lighting">
                    <option value="front lighting" selected>順光</option>
                    <option value="diagonal lighting">斜射光</option>
                    <option value="side lighting">側光</option>
                    <option value="backlighting">逆光</option>
                    <option value="top lighting">頂光</option>
                </select>
            </div>

            <div class="form-group">
                <label for="camera">🎥 鏡頭</label>
                <select id="camera">
                    <option value="">(不指定)</option>
                    <option value="medium shot, waist-up portrait, upper body clearly visible, face and torso in frame, not a close-up">半身</option>
                    <option value="full body shot, full-length portrait, entire body visible from head to toe">全身</option>
                    <option value="close-up on face, face fills most of the frame">特寫臉</option>
                    <option value="custom">自行填寫</option>
                </select>
                <input type="text" id="cameraCustom" placeholder="例如：側臉特寫、低角度拍攝" style="margin-top: 10px; display: none;">
            </div>

            <div class="form-group">
                <label for="scene">🏥 場景</label>
                <select id="scene">
                    <option value="clean simple background" selected>乾淨背景</option>
                    <option value="in a dental clinic">牙科診所</option>
                    <option value="in a traditional Chinese medicine clinic">中醫診所</option>
                    <option value="custom">自行填寫</option>
                </select>
                <input type="text" id="sceneCustom" placeholder="例如：醫院走廊、窗邊、診療椅旁" style="margin-top: 10px; display: none;">
            </div>

            <div class="form-group">
                <label for="custom">✏️ 其他描述（可填中文）</label>
                <input type="text" id="custom" placeholder="例如：拿著牙刷、站在診療椅旁">
            </div>
        </div>

        <div class="output-area">
            <label for="resultPrompt">生成結果：</label>
            <textarea id="resultPrompt" placeholder="你的 Prompt 會顯示在這裡..."></textarea>

            <div class="btn-group">
                <button class="btn-generate" onclick="generatePrompt()">🚀 組合 Prompt</button>
                <button class="btn-copy" onclick="copyPrompt()">📋 一鍵複製</button>
                <button class="btn-clear" onclick="clearForm()">🗑️ 清空</button>
            </div>
        </div>
    </div>

    <script>
        const cameraDictionary = [
            ["半身", "medium shot, waist-up portrait, upper body clearly visible, face and torso in frame, not a close-up"],
            ["上半身", "medium shot, waist-up portrait, upper body clearly visible, face and torso in frame, not a close-up"],
            ["全身", "full body shot, full-length portrait, entire body visible from head to toe"],
            ["特寫臉", "close-up on face, face fills most of the frame"],
            ["臉部特寫", "close-up on face, face fills most of the frame"],
            ["特寫", "close-up shot"],
            ["近拍", "close-up shot"],
            ["遠景", "long shot"],
            ["中景", "medium shot"],
            ["側臉", "side profile"],
            ["側面", "side view"],
            ["正面", "front view"],
            ["背面", "back view"],
            ["低角度", "low angle shot"],
            ["仰角", "low angle shot"],
            ["高角度", "high angle shot"],
            ["俯角", "high angle shot"],
            ["俯視", "top-down view"],
            ["鳥瞰", "bird's-eye view"],
            ["平視", "eye-level shot"],
            ["微距", "macro shot"],
            ["廣角", "wide-angle shot"],
            ["淺景深", "shallow depth of field"],
            ["景深", "depth of field"],
            ["人像", "portrait shot"]
        ];

        const sceneDictionary = [
            ["牙科診所", "in a dental clinic"],
            ["中醫診所", "in a traditional Chinese medicine clinic"],
            ["乾淨背景", "clean simple background"],
            ["診所", "in a clinic"],
            ["醫院", "in a hospital"],
            ["病房", "in a hospital room"],
            ["候診區", "in a waiting area"],
            ["走廊", "in a hallway"],
            ["窗邊", "by the window"],
            ["戶外", "outdoors"],
            ["室內", "indoors"],
            ["白色背景", "white background"],
            ["純色背景", "solid color background"],
            ["背景", "background"]
        ];

        const customDictionary = [
            ["拿著", "holding"],
            ["手拿", "holding"],
            ["牙刷", "a toothbrush"],
            ["牙醫", "dentist"],
            ["醫師", "doctor"],
            ["醫生", "doctor"],
            ["病人", "patient"],
            ["站著", "standing"],
            ["坐著", "sitting"],
            ["微笑", "smiling"],
            ["看向鏡頭", "looking at the camera"],
            ["看著鏡頭", "looking at the camera"],
            ["看向前方", "looking forward"],
            ["雙手抱胸", "arms crossed"],
            ["雙手", "both hands"],
            ["單手", "one hand"],
            ["旁邊", "beside"],
            ["附近", "near"],
            ["穿著", "wearing"],
            ["白袍", "lab coat"],
            ["西裝", "suit"],
            ["口罩", "face mask"],
            ["眼鏡", "glasses"],
            ["診療椅", "dental chair"],
            ["椅子", "chair"],
            ["窗邊", "by the window"],
            ["背景虛化", "blurred background"],
            ["淺景深", "shallow depth of field"]
        ];

        document.getElementById("camera").addEventListener("change", toggleCameraCustomInput);
        document.getElementById("scene").addEventListener("change", toggleSceneCustomInput);

        function toggleCameraCustomInput() {
            const cameraSelect = document.getElementById("camera");
            const cameraCustomInput = document.getElementById("cameraCustom");
            const isCustom = cameraSelect.value === "custom";

            cameraCustomInput.style.display = isCustom ? "block" : "none";

            if (!isCustom) {
                cameraCustomInput.value = "";
            }
        }

        function translateCustomCamera(text) {
            const normalized = text.trim();

            if (normalized === "") {
                return "";
            }

            if (!/[\u4e00-\u9fff]/.test(normalized)) {
                return normalized;
            }

            let translated = normalized;

            cameraDictionary.forEach(([zh, en]) => {
                translated = translated.replaceAll(zh, en);
            });

            translated = translated
                .replace(/[、，]/g, ", ")
                .replace(/拍攝/g, "shot")
                .replace(/鏡頭/g, "shot")
                .replace(/角度/g, "angle")
                .replace(/\s+/g, " ")
                .replace(/,\s*,/g, ",")
                .trim();

            return translated;
        }

        function enforceCameraFraming(cameraText) {
            const normalized = cameraText.trim().toLowerCase();

            if (normalized === "") {
                return "";
            }

            if (normalized.includes("waist-up") || normalized.includes("upper body clearly visible")) {
                return "medium shot, waist-up portrait, upper body clearly visible, face and torso in frame, chest to head visible, not a close-up";
            }

            if (normalized.includes("full-length") || normalized.includes("entire body visible")) {
                return "full body shot, full-length portrait, entire body visible from head to toe";
            }

            if (normalized.includes("face fills most of the frame")) {
                return "close-up on face, face fills most of the frame";
            }

            return cameraText;
        }

        function toggleSceneCustomInput() {
            const sceneSelect = document.getElementById("scene");
            const sceneCustomInput = document.getElementById("sceneCustom");
            const isCustom = sceneSelect.value === "custom";

            sceneCustomInput.style.display = isCustom ? "block" : "none";

            if (!isCustom) {
                sceneCustomInput.value = "";
            }
        }

        function translateCustomScene(text) {
            const normalized = text.trim();

            if (normalized === "") {
                return "";
            }

            if (!/[\u4e00-\u9fff]/.test(normalized)) {
                return normalized;
            }

            let translated = normalized;

            sceneDictionary.forEach(([zh, en]) => {
                translated = translated.replaceAll(zh, en);
            });

            translated = translated
                .replace(/[、，]/g, ", ")
                .replace(/旁/g, "side")
                .replace(/內/g, "inside")
                .replace(/外/g, "outside")
                .replace(/\s+/g, " ")
                .replace(/,\s*,/g, ",")
                .trim();

            return translated;
        }

        function translateCustomText(text) {
            const normalized = text.trim();

            if (normalized === "") {
                return "";
            }

            if (!/[\u4e00-\u9fff]/.test(normalized)) {
                return normalized;
            }

            let translated = normalized;
            const dictionaries = [cameraDictionary, sceneDictionary, customDictionary];

            dictionaries.forEach((dictionary) => {
                dictionary.forEach(([zh, en]) => {
                    translated = translated.replaceAll(zh, en);
                });
            });

            translated = translated
                .replace(/[、，；]/g, ", ")
                .replace(/與/g, " and ")
                .replace(/和/g, " and ")
                .replace(/在/g, "at ")
                .replace(/內/g, "inside")
                .replace(/外/g, "outside")
                .replace(/\s+/g, " ")
                .replace(/,\s*,/g, ",")
                .trim();

            return translated;
        }

        function generatePrompt() {
            const cameraValue = document.getElementById("camera").value;
            const finalCamera = cameraValue === "custom"
                ? enforceCameraFraming(translateCustomCamera(document.getElementById("cameraCustom").value))
                : enforceCameraFraming(cameraValue);
            const sceneValue = document.getElementById("scene").value;
            const finalScene = sceneValue === "custom"
                ? translateCustomScene(document.getElementById("sceneCustom").value)
                : sceneValue;
            const finalCustom = translateCustomText(document.getElementById("custom").value);

            const elements = [
                document.getElementById("style").value,
                finalCamera,
                document.getElementById("age").value,
                document.getElementById("race").value,
                document.getElementById("gender").value,
                document.getElementById("body").value,
                document.getElementById("clothing").value,
                document.getElementById("expression").value,
                document.getElementById("atmosphere").value,
                finalScene,
                document.getElementById("lighting").value,
                finalCustom
            ];

            const finalPrompt = elements.filter((item) => item.trim() !== "").join(", ");
            document.getElementById("resultPrompt").value = finalPrompt;
        }

        function copyPrompt() {
            const promptText = document.getElementById("resultPrompt");

            if (promptText.value === "") {
                alert("目前沒有 Prompt 可以複製喔！請先點擊組合。");
                return;
            }

            promptText.select();
            navigator.clipboard.writeText(promptText.value).then(() => {
                alert("✅ 複製成功！");
            });
        }

        function clearForm() {
            document.querySelectorAll("select").forEach((select) => {
                select.value = "";
            });
            document.getElementById("race").value = "Taiwanese";
            document.getElementById("body").value = "average build";
            document.getElementById("lighting").value = "front lighting";
            document.getElementById("scene").value = "clean simple background";
            document.getElementById("custom").value = "";
            document.getElementById("cameraCustom").value = "";
            document.getElementById("sceneCustom").value = "";
            document.getElementById("resultPrompt").value = "";
            toggleCameraCustomInput();
            toggleSceneCustomInput();
        }
    </script>
</body>
</html>
