<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 繪圖 Prompt 生成器 (專屬版)</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 700;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 14px;
        }

        select,
        input,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .custom-input {
            margin-top: 10px;
            display: none;
        }

        .hint {
            margin: 8px 0 0;
            font-size: 12px;
            color: #7f8c8d;
        }

        .output-area {
            margin-top: 30px;
            border-top: 2px dashed #eee;
            padding-top: 20px;
        }

        textarea {
            width: 100%;
            min-height: 130px;
            border: 2px solid #3498db;
            resize: vertical;
            margin-top: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            transition: background 0.3s;
        }

        .btn-generate {
            background-color: #3498db;
            color: #fff;
            flex: 2;
        }

        .btn-generate:hover {
            background-color: #2980b9;
        }

        .btn-copy {
            background-color: #2ecc71;
            color: #fff;
            flex: 1;
        }

        .btn-copy:hover {
            background-color: #27ae60;
        }

        .btn-clear {
            background-color: #e74c3c;
            color: #fff;
            flex: 1;
        }

        .btn-clear:hover {
            background-color: #c0392b;
        }
    </style>
</head>

        Object.keys(fieldConfig).forEach((fieldId) => {

            select.addEventListener("change", () => toggleCustomInput(fieldId));
            toggleCustomInput(fieldId);
        });

        document.getElementById("scene").addEventListener("change", toggleSceneColorInput);
        document.getElementById("sceneColor").addEventListener("change", toggleSceneColorCustomInput);

        function toggleCustomInput(fieldId) {
            const select = document.getElementById(fieldId);
            const customInput = document.getElementById(`${fieldId}Custom`);

            if (!customInput) {
                return;
            }

            const isCustom = select.value === "custom";
            customInput.style.display = isCustom ? "block" : "none";

            if (!isCustom) {
                customInput.value = "";
            }
        }

        function toggleSceneColorInput() {
            const sceneValue = document.getElementById("scene").value;
            const sceneColor = document.getElementById("sceneColor");
            const showColor = sceneValue === "solid color background";

            sceneColor.style.display = showColor ? "block" : "none";

            if (!showColor) {
                sceneColor.value = "";
                document.getElementById("sceneColorCustom").value = "";
                document.getElementById("sceneColorCustom").style.display = "none";
            } else {
                toggleSceneColorCustomInput();
            }
        }

        function toggleSceneColorCustomInput() {
            const sceneColor = document.getElementById("sceneColor");
            const sceneColorCustom = document.getElementById("sceneColorCustom");
            const showCustom = sceneColor.style.display !== "none" && sceneColor.value === "custom";

            sceneColorCustom.style.display = showCustom ? "block" : "none";

            if (!showCustom) {
                sceneColorCustom.value = "";
            }
        }

        function containsChinese(text) {
            return /[\u4e00-\u9fff]/.test(text);
        }

        function normalizeText(text) {
            return text
                .replace(/[、，；]/g, ", ")
                .replace(/與/g, " and ")
                .replace(/和/g, " and ")
                .replace(/拍攝/g, " shot")
                .replace(/鏡頭/g, " shot")
                .replace(/角度/g, " angle")
                .replace(/風格/g, " style")
                .replace(/光線/g, " lighting")
                .replace(/旁/g, " side")
                .replace(/內/g, " inside")
                .replace(/外/g, " outside")
                .replace(/\s+/g, " ")
                .replace(/,\s*,/g, ", ")
                .trim()
                .replace(/^,\s*/, "")
                .replace(/,\s*$/, "");
        }

        function translateByDictionary(text, dictionary) {
            const normalized = text.trim();

            if (normalized === "") {
                return "";
            }

            if (!containsChinese(normalized)) {
                return normalized;
            }

            let translated = normalized;
            dictionary.forEach(([zh, en]) => {
                translated = translated.replaceAll(zh, en);
            });

            return normalizeText(translated);
        }

        function translateCustomText(text) {
            const normalized = text.trim();

            if (normalized === "") {
                return "";
            }

            if (!containsChinese(normalized)) {
                return normalized;
            }

            const dictionaries = [
                styleDictionary,
                genderDictionary,
                ageDictionary,
                raceDictionary,
                bodyDictionary,
                clothingDictionary,
                expressionDictionary,
                atmosphereDictionary,
                lightingDictionary,
                cameraDictionary,
                sceneDictionary,
                customDictionary
            ];

            let translated = normalized;
            dictionaries.forEach((dictionary) => {
                dictionary.forEach(([zh, en]) => {
                    translated = translated.replaceAll(zh, en);
                });
            });

            return normalizeText(translated);
        }

        function enforceCameraFraming(cameraText) {
            const normalized = cameraText.trim().toLowerCase();

            if (normalized === "") {
                return "";
            }

            if (normalized.includes("waist-up") || normalized.includes("upper body clearly visible")) {
                return "medium shot, waist-up portrait, upper body clearly visible, face and torso in frame, chest to head visible, not a close-up";
            }

            if (normalized.includes("full-length") || normalized.includes("entire body visible")) {
                return "full body shot, full-length portrait, entire body visible from head to toe";
            }

            if (normalized.includes("face fills most of the frame")) {
                return "close-up on face, face fills most of the frame";
            }

            return cameraText;
        }

            const select = document.getElementById(fieldId);
            const customInput = document.getElementById(`${fieldId}Custom`);

                ? translateByDictionary(customInput.value, dictionary)
                : select.value;

            if (fieldId === "camera") {
                return enforceCameraFraming(value);
            }

            return value;
        }

        function getSceneValue() {
            const sceneValue = getFieldValue("scene");

            if (sceneValue !== "solid color background") {
                return sceneValue;
            }

            const sceneColorValue = document.getElementById("sceneColor").value;

            if (sceneColorValue === "") {
                return "solid color background";
            }

            if (sceneColorValue === "custom") {
                const customColor = translateByDictionary(document.getElementById("sceneColorCustom").value, colorDictionary);
                return customColor ? `${customColor} solid color background` : "solid color background";
            }

            return `${sceneColorValue} solid color background`;
        }

        async function copyTextToClipboard(text) {
            if (!text || !navigator.clipboard) {
                return false;
            }

            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (error) {
                return false;
            }
        }

        async function generatePrompt() {
            const elements = [
                getFieldValue("style"),
                getFieldValue("camera"),
                getFieldValue("age"),
                getFieldValue("race"),
                getFieldValue("gender"),
                getFieldValue("body"),
                getFieldValue("clothing"),
                getFieldValue("expression"),
                getFieldValue("atmosphere"),
                getSceneValue(),
                getFieldValue("lighting"),
                translateCustomText(document.getElementById("custom").value),
                permanentConstraints
            ];

            const finalPrompt = elements.filter((item) => item && item.trim() !== "").join(", ");
            document.getElementById("resultPrompt").value = finalPrompt;
            await copyTextToClipboard(finalPrompt);
        }

        async function copyPrompt() {
            const promptText = document.getElementById("resultPrompt");

            if (promptText.value === "") {
                alert("目前沒有 Prompt 可以複製喔！請先點擊組合。");
                return;
            }

            promptText.select();
            const copied = await copyTextToClipboard(promptText.value);

            if (copied) {
                alert("✅ 複製成功！");
            }
        }

        function clearForm() {
            Object.entries(defaultValues).forEach(([fieldId, defaultValue]) => {
                document.getElementById(fieldId).value = defaultValue;
                const customInput = document.getElementById(`${fieldId}Custom`);

                if (customInput) {
                    customInput.value = "";
                }

                toggleCustomInput(fieldId);
            });

            document.getElementById("sceneColor").value = "";
            document.getElementById("sceneColorCustom").value = "";
            document.getElementById("custom").value = "";
            document.getElementById("resultPrompt").value = "";
            toggleSceneColorInput();
        }
    </script>
</body>
</html>
